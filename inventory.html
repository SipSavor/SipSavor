<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sellers Inventory | SipSavor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfcf9; 
            --accent: #ff6b6b; 
            --card-shadow: 15px 15px 40px #e0dfdb, -15px -15px 40px #ffffff;
            --text: #2d3436;
            --green: #00b894;
            --red: #ff6b6b;
        }

        body {
            margin: 0; background-color: var(--bg); font-family: 'Outfit', sans-serif;
            color: var(--text); display: flex; flex-direction: column; align-items: center; padding-bottom: 80px;
        }

        nav {
            position: sticky; top: 20px; z-index: 1000; margin-top: 20px; width: 90%; max-width: 1100px;
            padding: 12px 25px; background: rgba(253, 252, 249, 0.9); backdrop-filter: blur(10px);
            border-radius: 100px; box-shadow: var(--card-shadow); display: flex; align-items: center;
            justify-content: space-between; gap: 15px; box-sizing: border-box;
        }

        .business-name { font-weight: 800; font-size: 1.3rem; color: var(--text); text-decoration: none; }
        .business-name span { color: var(--accent); }

        .search-wrapper { flex-grow: 1; max-width: 400px; position: relative; }
        #inventorySearch { width: 100%; padding: 12px 20px; border-radius: 50px; border: 1px solid rgba(0,0,0,0.08); outline: none; font-family: 'Outfit'; }

        .search-results-list { position: absolute; top: 55px; left: 0; width: 100%; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; z-index: 1001; overflow: hidden; border: 1px solid #eee; }
        .search-item { padding: 12px 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .search-item:hover { background: #fff5f5; }

        .seller-container { width: 90%; max-width: 1100px; margin-top: 35px; background: white; padding: 30px; border-radius: 35px; box-shadow: var(--card-shadow); border: 3px solid transparent; transition: 0.5s ease; scroll-margin-top: 110px; box-sizing: border-box; }
        .seller-info { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .seller-avatar { width: 50px; height: 50px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; }

        .inventory-table { width: 100%; border-collapse: collapse; }
        .inventory-table td { padding: 18px 12px; border-bottom: 1px solid #f9f9f9; font-weight: 600; }
        .mini-add-btn { background: var(--accent); color: white; border: none; padding: 6px 14px; border-radius: 12px; font-weight: 800; cursor: pointer; }

        /* Cart Styles */
        #cart-sidebar { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.1); z-index: 2000; transition: 0.4s; padding: 30px; display: flex; flex-direction: column; box-sizing: border-box; }
        #cart-sidebar.open { right: 0; }
        #cart-items { flex-grow: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #eee; font-weight: 600; cursor: pointer; }
        .cart-trigger { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: white; width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; z-index: 1500; }
        #cart-count { position: absolute; top: 0; right: 0; background: var(--text); color: white; font-size: 0.8rem; padding: 4px 8px; border-radius: 50%; border: 2px solid white; }
    </style>
</head>
<body>

    <div id="cart-sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0">Order Plan</h2>
            <div onclick="toggleCart()" style="cursor:pointer; font-size:1.8rem; font-weight:800; color:var(--accent);">×</div>
        </div>
        <div id="cart-items"></div>
        <div style="font-weight: 800; font-size: 1.4rem; text-align: right; margin-top:10px;">Total: $<span id="total-amount">0.00</span></div>
        <button onclick="clearCart()" style="margin-top:20px; background:#f1f1f1; border:none; padding:12px; border-radius:12px; cursor:pointer; font-weight:700; width:100%;">Clear All</button>
    </div>

    <div class="cart-trigger" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>

    <nav>
        <a href="index.html" class="business-name">SipSavor<span>.</span></a>
        <div class="search-wrapper">
            <input type="text" id="inventorySearch" placeholder="Search items or sellers..." autocomplete="off">
            <div id="search-results-list" class="search-results-list"></div>
        </div>
        <div style="display:flex; gap:15px;">
            <a href="menu.html" style="text-decoration:none; color:var(--text); font-weight:600;">Menu</a>
            <a href="inventory.html" style="text-decoration:none; color:var(--accent); font-weight:600;">Sellers</a>
        </div>
    </nav>

    <div class="seller-container" id="seller-ayden">
        <div class="seller-info"><div class="seller-avatar">AW</div><h2>Ayden Wilson</h2></div>
        <table class="inventory-table">
            <tr><td>Water Bottle</td><td>$1.00</td><td><button class="mini-add-btn" onclick="addToCart('Water Bottle', 1.0)">+ Add</button></td></tr>
            <tr><td>Takis Fuego</td><td>$1.00</td><td><button class="mini-add-btn" onclick="addToCart('Takis Fuego', 1.0)">+ Add</button></td></tr>
        </table>
    </div>

    <div class="seller-container" id="seller-samuel">
        <div class="seller-info"><div class="seller-avatar" style="background:#6c5ce7;">SD</div><h2>Samuel Davis</h2></div>
        <table class="inventory-table">
            <tr><td>Gatorade</td><td>$2.00</td><td><button class="mini-add-btn" onclick="addToCart('Gatorade', 2.0)">+ Add</button></td></tr>
        </table>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('sipSavorCart')) || [];
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); }
        function saveAndUpdate() { localStorage.setItem('sipSavorCart', JSON.stringify(cart)); updateUI(); }
        function addToCart(name, price) { cart.push({ name, price: parseFloat(price) }); saveAndUpdate(); toggleCart(); }
        function removeFromCart(index) { cart.splice(index, 1); saveAndUpdate(); }
        function clearCart() { cart = []; saveAndUpdate(); }

        function updateUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = ''; let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.onclick = () => removeFromCart(index);
                div.innerHTML = `<span>${item.name}</span><span>$${item.price.toFixed(2)}</span>`;
                container.appendChild(div);
            });
            document.getElementById('total-amount').innerText = total.toFixed(2);
            document.getElementById('cart-count').innerText = cart.length;
        }
        updateUI();

        const inventoryData = [
            { name: "Water Bottle", info: "$1.00", type: "snack", target: "menu.html" },
            { name: "Takis Fuego", info: "$1.00", type: "snack", target: "menu.html" },
            { name: "Gatorade", info: "$2.00", type: "snack", target: "menu.html" },
            { name: "Ayden Wilson", info: "Seller", type: "seller", target: "seller-ayden" },
            { name: "Samuel Davis", info: "Seller", type: "seller", target: "seller-samuel" }
        ];

        const searchInput = document.getElementById('inventorySearch');
        const resultsList = document.getElementById('search-results-list');

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase().trim();
            resultsList.innerHTML = '';
            if (query === '') { resultsList.style.display = 'none'; return; }
            const matches = inventoryData.filter(item => item.name.toLowerCase().includes(query));
            if (matches.length > 0) {
                resultsList.style.display = 'block';
                matches.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `<div><b>${item.name}</b><br><small>${item.info}</small></div>`;
                    div.onclick = () => {
                        if (item.type === "snack") { window.location.href = item.target; }
                        else { 
                            const el = document.getElementById(item.target);
                            el.scrollIntoView({ behavior: 'smooth' });
                            el.style.borderColor = 'var(--accent)';
                            setTimeout(() => el.style.borderColor = 'transparent', 2000);
                            resultsList.style.display = 'none';
                        }
                    };
                    resultsList.appendChild(div);
                });
            }
        });
        document.addEventListener('click', (e) => { if (!searchInput.contains(e.target)) resultsList.style.display = 'none'; });
    </script>
</body>
</html>
